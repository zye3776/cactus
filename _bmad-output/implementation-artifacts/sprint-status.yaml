    epic: 1
    state: done
    commits:
      - "36b116aa test(story-1.3): acceptance tests (red)"
      - "dc230fa6 feat(story-1.3): measurement spike test"
    notes: "MeasurementSpikeTests.swift (192 LOC, single test method) loads Whisper + Silero VAD + Gemma-3 via FFIShim, measures peak resident memory via task_info / mach_task_basic_info, sums .app bundle size, appends one CSV row to _bmad-output/implementation-artifacts/measurement-spike-results.csv, and verifies residency returns to baseline ± 50 MB after free. Gated by CACTUSVOICE_WHISPER_PATH / GEMMA_PATH / VAD_PATH / APP_BUNDLE_PATH env vars (XCTSkipUnless) — does not run in CI or on the current dev host (no real models; FFIStub.c still returns cactus_status_err_unimplemented). Numbers will be produced once Story 3.1 wires real cactus runtime. swiftc -parse passes; full -typecheck blocked by absent XCTest module on this CLT-only host (same constraint as 1.1, 1.2). NFR-001 divergence procedure (file PRD revision PR if measured deviates > 20% from ~600 MB minimal / ~2.5 GB full) is documented in the spike header comment."
  - id: "1.4"
    title: AppError enum + os.Logger conventions
    epic: 1
    state: done
    commits:
      - "daafa0b3 test(story-1.4): acceptance tests (red)"
      - "fd2657e1 feat(story-1.4): AppError enum + os.Logger conventions"
      - "2b462d49 refactor(story-1.4): KISS compliance"
    notes: "AppError.swift (55 LOC) declares enum AppError: Error, LocalizedError, Equatable, Sendable with the 7 required cases and a nested InferenceStage (.audio, .whisper, .vad, .llm, .correction). Every case maps to a declarative ≤ 8-word banner per UX-DR6 (.micDenied = 'Microphone access required.'). AppErrorMappingTests.swift (57 LOC) iterates representative instances and asserts non-nil errorDescription, ≤ 48 chars, ≤ 8 words, no '!', and Equatable on associated values. Errors/README.md (42 LOC) documents one-Logger-per-file (com.cactusvoice subsystem), log-once-on-creation, privacy: .private for user content, no clipboard logging, and the deferred-linter note. swiftc -typecheck on AppError.swift: OK against Foundation. swiftc -parse on the mapping test: OK; full -typecheck blocked by absent XCTest module on this CLT-only host (same constraint as 1.1, 1.2, 1.3). xcodegen re-generated .xcodeproj cleanly; project globs pick up Errors/ subdirs automatically (no project.yml change)."
  - id: "1.5"
    title: Settings persistence (UserDefaults + Codable + @Observable mirror)
    epic: 1
    state: done
    commits:
      - "2a9ddcc3 test(story-1.5): acceptance tests (red)"
      - "6694ead0 feat(story-1.5): Settings + SettingsStore persistence"
    notes: "Settings.swift (112 LOC) declares Settings (Codable struct, six fields), ActivationMode (.hold default), SettingsKeys.blob = 'com.cactusvoice.settings.v1', and SettingsStore (@MainActor @Observable final class) with didSet write-through, JSON encode/decode, and missing-key fallback. SettingsStore is the only file in the project that references Foundation.UserDefaults (FileManager-walk grep in Story1_5Tests enforces this at static-check time). SettingsCodecTests.swift round-trips Settings through JSONEncoder/JSONDecoder with nil paths and 1 KB bookmark blobs (Data(repeating: 0x42, count: 1024)), round-trips through UserDefaults(suiteName: 'test.cactusvoice') cleared in setUp/tearDown, asserts default activationMode == .hold, and asserts observability via withObservationTracking. Deviation: hotkey is persisted as String? (raw KeyboardShortcuts.Name) rather than KeyboardShortcuts.Name? — the typed value is reachable via Settings.hotkeyName in Persistence/SettingsHotkeyBridge.swift. Rationale (documented in story-1.5.md): Settings.swift typechecks Foundation-only without SPM resolution; persistence file does not depend on the third-party package; round-trip is lossless because KeyboardShortcuts.Name is RawRepresentable<String>. swiftc -typecheck Settings.swift: OK. SettingsCodecTests + SettingsHotkeyBridge require XCTest / KeyboardShortcuts SPM, deferred to a host with Xcode.app (same constraint as 1.1-1.4). xcodegen re-generated cleanly (no project.yml change; Persistence/ folder picked up by existing glob)."
  - id: "2.1"
    title: BoundedSPSCBuffer<Float>
    epic: 2
    state: done
    commits:
      - "c63806a2 test(story-2.1): acceptance tests (red)"
      - "9508aa7b feat(story-2.1): BoundedSPSCBuffer<T> ring buffer"
      - "25dfe320 refactor(story-2.1): KISS compliance"
    notes: "BoundedSPSCBuffer.swift (167 LOC) is a public final generic class (NOT actor) with fixed init(capacity:), [T?] storage, write([T]) / read() -> ArraySlice<T> / removeAll() API, OSAllocatedUnfairLock-guarded head/tail/_overrunCount, and overrunStream AsyncStream<Int> emitting cumulative overrunCount on every drop. Two-stage drop logic: if incoming.count > capacity, drop batch prefix (droppedFromBatch); then if remaining > available, drop oldest from ring (droppedFromRing); sum into _overrunCount and yield on overrunStream. BoundedSPSCBufferTests.swift covers round-trip, partial reads, both overrun cases (incremental + single huge batch), removeAll zero-retain (re-usable post-reset), overrunStream delivery via Task+for-await, and a 10 000-op DispatchQueue producer/consumer fuzz asserting pulled.count + overrunCount == produced and consumer sees strictly monotonic FIFO (no dup, no re-order). Deviation: architecture §A says 'no locks; Atomic head/tail indices' — implementation uses OSAllocatedUnfairLock instead because (a) swift-atomics is not on SPM graph, (b) stdlib Synchronization.UnsafeAtomic is Swift 6 only and project is Swift 5.10, (c) lock guards O(1) integer ops with negligible SPSC contention. Public API is identical to the eventual lock-free version, swappable later without consumer changes. Documented in BoundedSPSCBuffer.swift header and story-2.1.md. swiftc -typecheck BoundedSPSCBuffer.swift: OK (Foundation + os). BoundedSPSCBufferTests.swift requires XCTest / @testable import CactusVoice, deferred to a host with Xcode.app (same constraint as 1.1-1.5). xcodegen re-generated cleanly (no project.yml change; Audio/ folders picked up by existing globs)."
