  - id: "1.2"
    title: Define cactus_c.h FFI surface (widened for accuracy pipeline)
    epic: 1
    state: done
    commits:
      - "9d125972 test(story-1.2): acceptance tests (red)"
      - "fd16cdf5 feat(story-1.2): cactus_c.h FFI surface + Swift shim"
    notes: "Strict-C11 header parses cleanly (clang -fsyntax-only -Wall -Wpedantic -Werror -std=c11). FFIStub.c (weak stubs returning cactus_status_err_unimplemented) lets the static lib link without libcactus. FFIShim.swift mirrors the C surface 1-1 (no policy, no caching, no logging); typecheck passes via -import-objc-header. module.modulemap exposes cactus_c.h alongside the existing umbrella. xcodegen re-generates .xcodeproj cleanly. Real cactus runtime wiring is deferred to Story 3.1 (CactusRuntime)."
  - id: "1.3"
    title: Measurement spike — bundle + tiered resident memory
    epic: 1
    state: done
    commits:
      - "36b116aa test(story-1.3): acceptance tests (red)"
      - "dc230fa6 feat(story-1.3): measurement spike test"
    notes: "MeasurementSpikeTests.swift (192 LOC, single test method) loads Whisper + Silero VAD + Gemma-3 via FFIShim, measures peak resident memory via task_info / mach_task_basic_info, sums .app bundle size, appends one CSV row to _bmad-output/implementation-artifacts/measurement-spike-results.csv, and verifies residency returns to baseline ± 50 MB after free. Gated by CACTUSVOICE_WHISPER_PATH / GEMMA_PATH / VAD_PATH / APP_BUNDLE_PATH env vars (XCTSkipUnless) — does not run in CI or on the current dev host (no real models; FFIStub.c still returns cactus_status_err_unimplemented). Numbers will be produced once Story 3.1 wires real cactus runtime. swiftc -parse passes; full -typecheck blocked by absent XCTest module on this CLT-only host (same constraint as 1.1, 1.2). NFR-001 divergence procedure (file PRD revision PR if measured deviates > 20% from ~600 MB minimal / ~2.5 GB full) is documented in the spike header comment."
  - id: "1.4"
    title: AppError enum + os.Logger conventions
    epic: 1
    state: done
    commits:
      - "daafa0b3 test(story-1.4): acceptance tests (red)"
      - "fd2657e1 feat(story-1.4): AppError enum + os.Logger conventions"
      - "2b462d49 refactor(story-1.4): KISS compliance"
    notes: "AppError.swift (55 LOC) declares enum AppError: Error, LocalizedError, Equatable, Sendable with the 7 required cases and a nested InferenceStage (.audio, .whisper, .vad, .llm, .correction). Every case maps to a declarative ≤ 8-word banner per UX-DR6 (.micDenied = 'Microphone access required.'). AppErrorMappingTests.swift (57 LOC) iterates representative instances and asserts non-nil errorDescription, ≤ 48 chars, ≤ 8 words, no '!', and Equatable on associated values. Errors/README.md (42 LOC) documents one-Logger-per-file (com.cactusvoice subsystem), log-once-on-creation, privacy: .private for user content, no clipboard logging, and the deferred-linter note. swiftc -typecheck on AppError.swift: OK against Foundation. swiftc -parse on the mapping test: OK; full -typecheck blocked by absent XCTest module on this CLT-only host (same constraint as 1.1, 1.2, 1.3). xcodegen re-generated .xcodeproj cleanly; project globs pick up Errors/ subdirs automatically (no project.yml change)."
